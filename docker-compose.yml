services:
  devcontainer:
    image: docker.io/1ukastesar/fit-flp-hs
    container_name: flp-hs-playground
    ports:
      - 127.0.0.1:8888:8888
    userns_mode: host
    volumes:
      - .:/workspaces/hs-playground:Z
      - ./work:/home/jovyan/work:Z
      - ./jupyter_server_config.py:/home/jovyan/.jupyter/jupyter_server_config.py:ro,Z
